<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap');

    .bg { fill: #FAFBFD; }
    .icon-grad-start { stop-color: #38BDF8; }
    .icon-grad-end { stop-color: #0369A1; }
    .title { fill: #0C1425; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 68px; font-weight: 800; letter-spacing: -2.5px; }
    .tagline { fill: #5E6B81; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px; font-weight: 500; letter-spacing: 5px; }
    .dot-accent { fill: #FB7185; }
    .divider { stroke: #E2E8F0; }
    .badge-bg { fill: #F0F9FF; }
    .badge-border { stroke: #BAE6FD; }
    .badge-text { fill: #0369A1; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; }
    .grid-line { stroke: #0369A1; }
    .corner { stroke: #CBD5E1; }
    .desc { fill: #94A3B8; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 400; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0A0F1C; }
      .title { fill: #F1F5F9; }
      .tagline { fill: #64748B; }
      .divider { stroke: #1E293B; }
      .badge-bg { fill: #0C1A2E; }
      .badge-border { stroke: #164E63; }
      .badge-text { fill: #38BDF8; }
      .grid-line { stroke: #38BDF8; }
      .corner { stroke: #1E293B; }
      .desc { fill: #475569; }
    }
  </style>

  <defs>
    <linearGradient id="qGrad" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" class="icon-grad-start"/>
      <stop offset="100%" class="icon-grad-end"/>
    </linearGradient>
    <mask id="qm">
      <rect width="1280" height="360" fill="black"/>
      <rect x="56" y="56" width="248" height="248" fill="white"/>
      <circle cx="180" cy="180" r="63" fill="black"/>
      <rect x="178" y="178" width="100" height="56" fill="black" transform="rotate(38 180 180)"/>
    </mask>
    <pattern id="grid" width="248" height="248" patternUnits="userSpaceOnUse" x="56" y="56">
      <line x1="0" y1="62" x2="248" y2="62" class="grid-line" stroke-width="0.3" opacity="0.05"/>
      <line x1="0" y1="124" x2="248" y2="124" class="grid-line" stroke-width="0.3" opacity="0.05"/>
      <line x1="0" y1="186" x2="248" y2="186" class="grid-line" stroke-width="0.3" opacity="0.05"/>
      <line x1="62" y1="0" x2="62" y2="248" class="grid-line" stroke-width="0.3" opacity="0.05"/>
      <line x1="124" y1="0" x2="124" y2="248" class="grid-line" stroke-width="0.3" opacity="0.05"/>
      <line x1="186" y1="0" x2="186" y2="248" class="grid-line" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" class="bg"/>

  <!-- Faint grid behind icon area -->
  <rect x="56" y="56" width="248" height="248" fill="url(#grid)"/>

  <!-- Subtle corner marks around icon -->
  <g class="corner" stroke-width="1" fill="none" opacity="0.4">
    <path d="M56,72 L56,56 L72,56"/>
    <path d="M288,56 L304,56 L304,72"/>
    <path d="M304,288 L304,304 L288,304"/>
    <path d="M72,304 L56,304 L56,288"/>
  </g>

  <!-- Q Icon -->
  <circle cx="180" cy="180" r="124" fill="url(#qGrad)" mask="url(#qm)"/>
  <circle cx="180" cy="180" r="7" class="dot-accent"/>

  <!-- Vertical divider -->
  <line x1="368" y1="80" x2="368" y2="280" class="divider" stroke-width="1"/>

  <!-- Title -->
  <text x="416" y="168" class="title">Qadra</text>

  <!-- Tagline -->
  <text x="418" y="206" class="tagline">2D CAD DRAFTING</text>

  <!-- Description -->
  <text x="418" y="248" class="desc">Precision drafting tools for modern design workflows</text>

  <!-- Version badge -->
  <rect x="418" y="268" width="62" height="26" rx="6" class="badge-bg"/>
  <rect x="418" y="268" width="62" height="26" rx="6" fill="none" class="badge-border" stroke-width="1"/>
  <text x="449" y="285.5" class="badge-text" text-anchor="middle">v1.0</text>

  <!-- Open source badge -->
  <rect x="492" y="268" width="98" height="26" rx="6" class="badge-bg"/>
  <rect x="492" y="268" width="98" height="26" rx="6" fill="none" class="badge-border" stroke-width="1"/>
  <text x="541" y="285.5" class="badge-text" text-anchor="middle">open source</text>
</svg>
